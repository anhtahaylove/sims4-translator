repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
  - repo: local
    hooks:
      - id: ruff-focused-check
        name: ruff focused check
        entry: python -m ruff check . --select E9,F63,F7,F82
        language: system
        pass_filenames: false

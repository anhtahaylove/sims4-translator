name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, for example 2.2.17
        required: true
        default: 2.2.17
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  windows-artifact:
    name: Build Windows release artifact
    runs-on: windows-2025-vs2026
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Resolve release version
        id: version
        shell: powershell
        run: |
          $Version = '${{ inputs.version }}'
          if ('${{ github.ref_type }}' -eq 'tag') {
            $Version = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ($Version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version must be X.Y.Z, got $Version"
          }
          "version=$Version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -c constraints.txt

      - name: Generate visual i18n QA screenshots
        shell: powershell
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python scripts\visual_i18n_smoke.py --languages english german russian ukrainian brasil chinese vietnamese --version $env:RELEASE_VERSION --strict-layout --screenshots
          python scripts\visual_i18n_smoke.py --pseudo --version $env:RELEASE_VERSION --strict-layout --screenshots

      - name: Upload visual i18n QA screenshots
        uses: actions/upload-artifact@v7
        with:
          name: i18n-visual-qa-v${{ steps.version.outputs.version }}
          path: build/i18n-visual-qa/v${{ steps.version.outputs.version }}/
          if-no-files-found: error
          retention-days: 30

      - name: Build Windows app
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows.ps1

      - name: Package ZIP and checksum
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\package_release.ps1 -Version '${{ steps.version.outputs.version }}' -Force

      - name: Generate GitHub artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            The-Sims-4-Translator-Plus-v${{ steps.version.outputs.version }}-windows.zip
            The-Sims-4-Translator-Plus-v${{ steps.version.outputs.version }}-windows.zip.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign ZIP with cosign keyless
        shell: powershell
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $ZipName = "The-Sims-4-Translator-Plus-v$env:RELEASE_VERSION-windows.zip"
          $BundleName = "$ZipName.sigstore.json"
          cosign sign-blob --yes --bundle $BundleName $ZipName

      - name: Verify cosign signature
        shell: powershell
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release-build.yml@${{ github.ref }}
        run: |
          $ZipName = "The-Sims-4-Translator-Plus-v$env:RELEASE_VERSION-windows.zip"
          $BundleName = "$ZipName.sigstore.json"
          cosign verify-blob `
            --bundle $BundleName `
            --certificate-identity $env:RELEASE_IDENTITY `
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
            $ZipName

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: The-Sims-4-Translator-Plus-v${{ steps.version.outputs.version }}-windows
          path: |
            The-Sims-4-Translator-Plus-v${{ steps.version.outputs.version }}-windows.zip
            The-Sims-4-Translator-Plus-v${{ steps.version.outputs.version }}-windows.zip.sha256
            The-Sims-4-Translator-Plus-v${{ steps.version.outputs.version }}-windows.zip.sigstore.json
          if-no-files-found: error

      - name: Publish GitHub Release for tags
        if: github.ref_type == 'tag'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $Tag = "v$env:RELEASE_VERSION"
          $ZipName = "The-Sims-4-Translator-Plus-v$env:RELEASE_VERSION-windows.zip"
          $ChecksumName = "$ZipName.sha256"
          $BundleName = "$ZipName.sigstore.json"
          $NotesFile = Join-Path $env:RUNNER_TEMP "release-notes-$Tag.md"

          $Notes = @"
          The Sims 4 Translator Plus $Tag

          This release was built by GitHub Actions from the public repository.

          Verification files:
          - Windows ZIP: ``$ZipName``
          - SHA256 checksum: ``$ChecksumName``
          - Sigstore/cosign bundle: ``$BundleName``

          Verify the checksum:
          ````powershell
          Get-FileHash .\$ZipName -Algorithm SHA256
          ````

          Verify GitHub build provenance:
          ````powershell
          gh attestation verify .\$ZipName --repo anhtahaylove/sims4-translator
          ````

          Verify the cosign keyless signature:
          ````powershell
          cosign verify-blob --bundle .\$BundleName --certificate-identity "https://github.com/anhtahaylove/sims4-translator/.github/workflows/release-build.yml@refs/tags/$Tag" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" .\$ZipName
          ````

          Notes:
          - The Windows executable is not Authenticode code-signed yet, so SmartScreen may still warn on first run.
          - Sigstore/cosign proves release provenance; it does not replace Windows code signing.
          - This community project is not affiliated with Electronic Arts, Maxis, or The Sims.
          "@
          $Notes.Trim() | Set-Content -LiteralPath $NotesFile -Encoding utf8

          $PreviousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          gh release view $Tag --repo $env:GITHUB_REPOSITORY 1>$null 2>$null
          $ReleaseExists = ($LASTEXITCODE -eq 0)
          $ErrorActionPreference = $PreviousErrorActionPreference

          if ($ReleaseExists) {
            gh release edit $Tag --repo $env:GITHUB_REPOSITORY --title "The Sims 4 Translator Plus $Tag" --notes-file $NotesFile
            gh release upload $Tag $ZipName $ChecksumName $BundleName --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $Tag $ZipName $ChecksumName $BundleName --repo $env:GITHUB_REPOSITORY --title "The Sims 4 Translator Plus $Tag" --notes-file $NotesFile
          }
